Builds:
  - versionName: 0.1.8
    versionCode: 91
    commit: v0.1.8
    submodules: true
    output: build/app/outputs/flutter-apk/app-x86_64-release.apk
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - bash ./scripts/prepare_flutter_submodule.sh
      - ./third_party/flutter/bin/flutter pub get
    scanignore:
      - third_party/flutter/bin/cache
    scandelete:
      - third_party/flutter
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - bash ./scripts/prepare_flutter_submodule.sh
      - ./third_party/flutter/bin/flutter build apk --release --split-per-abi
        --target-platform="android-x64"

  - versionName: 0.1.8
    versionCode: 92
    commit: v0.1.8
    submodules: true
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
