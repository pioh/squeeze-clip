Builds:
  - versionName: 0.1.1
    versionCode: 2
    commit: v0.1.1
    output: build/app/outputs/flutter-apk/app-release.apk
    submodules: true
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - ./third_party/flutter/bin/flutter config --no-analytics
      - ./third_party/flutter/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - ./third_party/flutter/bin/flutter build apk --release

