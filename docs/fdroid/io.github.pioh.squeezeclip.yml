Builds:
  - versionName: 0.1.7
    versionCode: 8
    commit: v0.1.7
    submodules: true
    output: build/app/outputs/flutter-apk/app-release.apk
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - bash ./scripts/prepare_flutter_submodule.sh
      - ./third_party/flutter/bin/flutter pub get
    scanignore:
      - third_party/flutter/bin/cache
    scandelete:
      - third_party/flutter
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - bash ./scripts/prepare_flutter_submodule.sh
      - ./third_party/flutter/bin/flutter build apk --release

  - versionName: 0.1.8
    versionCode: 1009
    commit: v0.1.8
    submodules: true
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: https://github.com/pioh/squeeze-clip/releases/download/v%v/SqueezeClip-%v-armeabi-v7a.apk
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - bash ./scripts/prepare_flutter_submodule.sh
      - ./third_party/flutter/bin/flutter pub get
    scanignore:
      - third_party/flutter/bin/cache
    scandelete:
      - third_party/flutter
      - .pub-cache
    build:
      - cd ../..
      - mv io.github.pioh.squeezeclip /tmp/build
      - cd /tmp/build
      - export PUB_CACHE=/tmp/build/.pub-cache
      - bash ./scripts/prepare_flutter_submodule.sh
      - ./third_party/flutter/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
      - cd /
      - mv /tmp/build /home/vagrant/build/io.github.pioh.squeezeclip

