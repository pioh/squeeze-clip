name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Prepare versioned release files
        run: |
          mkdir -p build/release
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          cp build/app/outputs/flutter-apk/app-release.apk "build/release/SqueezeClip-v${VERSION}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "build/release/SqueezeClip-v${VERSION}.aab"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: squeezeclip-release-artifacts
          path: |
            build/release/SqueezeClip-v*.apk
            build/release/SqueezeClip-v*.aab

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/SqueezeClip-v*.apk
            build/release/SqueezeClip-v*.aab
          generate_release_notes: true
