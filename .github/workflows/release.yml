name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/squeezeclip-upload.jks
          cat > android/key.properties <<PROPS
          storeFile=../../keystore/squeezeclip-upload.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=squeezeclip
          keyPassword=$KEYSTORE_PASSWORD
          PROPS

      - name: Build from fixed path for reproducibility
        run: |
          # Move to /tmp/build so libapp.so embeds a fixed path
          # (workaround for flutter/flutter#140558)
          cp -a "$GITHUB_WORKSPACE" /tmp/build
          cd /tmp/build
          export PUB_CACHE=/tmp/build/.pub-cache
          bash ./scripts/prepare_flutter_submodule.sh
          ./third_party/flutter/bin/flutter pub get
          ./third_party/flutter/bin/flutter analyze
          ./third_party/flutter/bin/flutter build apk --release --split-per-abi
          ./third_party/flutter/bin/flutter build appbundle --release
          # Copy build artifacts back
          cp -a /tmp/build/build "$GITHUB_WORKSPACE/build"

      - name: Prepare versioned release files
        run: |
          mkdir -p build/release
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          for abi in arm64-v8a armeabi-v7a x86_64; do
            cp "build/app/outputs/flutter-apk/app-${abi}-release.apk" "build/release/SqueezeClip-${VERSION}-${abi}.apk"
            sha256sum "build/release/SqueezeClip-${VERSION}-${abi}.apk" > "build/release/SqueezeClip-${VERSION}-${abi}.apk.sha256"
          done
          cp build/app/outputs/bundle/release/app-release.aab "build/release/SqueezeClip-${VERSION}.aab"
          sha256sum "build/release/SqueezeClip-${VERSION}.aab" > "build/release/SqueezeClip-${VERSION}.aab.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: squeezeclip-release-artifacts
          path: |
            build/release/SqueezeClip-*.apk
            build/release/SqueezeClip-*.apk.sha256
            build/release/SqueezeClip-*.aab
            build/release/SqueezeClip-*.aab.sha256

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/SqueezeClip-*.apk
            build/release/SqueezeClip-*.apk.sha256
            build/release/SqueezeClip-*.aab
            build/release/SqueezeClip-*.aab.sha256
          generate_release_notes: true
