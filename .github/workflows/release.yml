name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Add bundled Flutter to PATH
        run: |
          echo "$GITHUB_WORKSPACE/third_party/flutter/bin" >> "$GITHUB_PATH"

      - name: Prepare bundled Flutter submodule
        run: bash ./scripts/prepare_flutter_submodule.sh

      - name: Flutter pub get
        run: |
          flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build per-ABI release APKs
        run: flutter build apk --release --split-per-abi

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Prepare versioned release files
        run: |
          mkdir -p build/release
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          for abi in arm64-v8a armeabi-v7a x86_64; do
            cp "build/app/outputs/flutter-apk/app-${abi}-release.apk" "build/release/SqueezeClip-v${VERSION}-${abi}.apk"
            sha256sum "build/release/SqueezeClip-v${VERSION}-${abi}.apk" > "build/release/SqueezeClip-v${VERSION}-${abi}.apk.sha256"
          done
          cp build/app/outputs/bundle/release/app-release.aab "build/release/SqueezeClip-v${VERSION}.aab"
          sha256sum "build/release/SqueezeClip-v${VERSION}.aab" > "build/release/SqueezeClip-v${VERSION}.aab.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: squeezeclip-release-artifacts
          path: |
            build/release/SqueezeClip-v*.apk
            build/release/SqueezeClip-v*.apk.sha256
            build/release/SqueezeClip-v*.aab
            build/release/SqueezeClip-v*.aab.sha256

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/SqueezeClip-v*.apk
            build/release/SqueezeClip-v*.apk.sha256
            build/release/SqueezeClip-v*.aab
            build/release/SqueezeClip-v*.aab.sha256
          generate_release_notes: true
